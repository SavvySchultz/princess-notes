<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Royal Ticket Archive</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="background-sparkles"></div>

  <header class="top-bar">
    <div>
      <h1>👑 Royal Ticket Archive</h1>
      <p>Your princess-themed IT storage vault</p>
    </div>
    <a href="new-ticket.html" class="btn btn-primary">New Ticket</a>
  </header>

  <main class="layout">
    <aside class="sidebar card">
      <h2>Search the Archive</h2>

      <input id="searchInput" class="input" type="text" placeholder="Search tickets..." />

      <label class="label">Category</label>
      <select id="filterCategory" class="input">
        <option value="">All Categories</option>
        <option value="VPN">VPN</option>
        <option value="Email">Email</option>
        <option value="Printer">Printer</option>
        <option value="Hardware">Hardware</option>
        <option value="Software">Software</option>
        <option value="Network">Network</option>
        <option value="Account">Account</option>
        <option value="Other">Other</option>
      </select>

      <button id="clearFiltersBtn" class="btn btn-secondary full-width">Clear Filters</button>
    </aside>

    <section class="content card">
      <div class="content-header">
        <h2>Saved Tickets</h2>
        <p>Click a ticket to view or edit it.</p>
      </div>

      <div id="ticketList" class="ticket-list"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
