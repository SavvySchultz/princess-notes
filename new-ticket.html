<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Royal Ticket</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="background-sparkles"></div>

  <header class="top-bar">
    <div>
      <h1>✨ New Royal Ticket</h1>
      <p>Create a new storage note for your archive</p>
    </div>
    <a href="index.html" class="btn btn-secondary">Back to Archive</a>
  </header>

  <main class="single-page">
    <section class="card form-card">
      <form id="newTicketForm">
        <label class="label" for="ticketNumber">Ticket Number *</label>
        <input id="ticketNumber" class="input" type="text" placeholder="e.g. IT-45821" required />

        <label class="label" for="title">Title *</label>
        <input id="title" class="input" type="text" placeholder="e.g. VPN login failed after reset" required />

        <label class="label" for="category">Category *</label>
        <select id="category" class="input" required>
          <option value="">Select category</option>
          <option value="VPN">VPN</option>
          <option value="Email">Email</option>
          <option value="Printer">Printer</option>
          <option value="Hardware">Hardware</option>
          <option value="Software">Software</option>
          <option value="Network">Network</option>
          <option value="Account">Account</option>
          <option value="Other">Other</option>
        </select>

        <label class="label" for="tags">Tags</label>
        <input id="tags" class="input" type="text" placeholder="vpn, password reset, mfa" />

        <label class="label" for="symptoms">Symptoms</label>
        <textarea id="symptoms" class="textarea" placeholder="Describe the issue..."></textarea>

        <label class="label" for="resolution">Resolution</label>
        <textarea id="resolution" class="textarea" placeholder="What fixed it..."></textarea>

        <label class="label" for="notes">Additional Notes</label>
        <textarea id="notes" class="textarea" placeholder="Extra context, steps, or reminders..."></textarea>

        <div class="button-row">
          <button type="submit" class="btn btn-primary">Save Ticket</button>
          <a href="index.html" class="btn btn-secondary">Cancel</a>
        </div>
      </form>

      <div id="saveMessage" class="save-message"></div>
    </section>
  </main>

  <script src="new-ticket.js"></script>
</body>
</html>
